name: Java CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
      - develop
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Maven tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven tests
        run: mvn --batch-mode --no-transfer-progress test
